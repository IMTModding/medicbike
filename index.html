  <body>
    <!-- Fallback visible even if the JS bundle fails to load -->
    <div id="root">
      <style>
        html, body { height: 100%; margin: 0; }
        body { background: #0b1a2b; color: #ffffff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
        #boot-loader { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        #boot-loader .card { max-width: 520px; width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 20px; }
        #boot-loader .title { font-weight: 800; letter-spacing: 0.02em; margin: 0 0 8px; }
        #boot-loader .muted { opacity: 0.85; margin: 0; }
        #boot-loader .hint { opacity: 0.75; margin: 14px 0 0; font-size: 12px; line-height: 1.4; }
      </style>
      <div id="boot-loader">
        <div class="card">
          <h1 class="title">MEDICBIKE</h1>
          <p class="muted">Chargement en cours…</p>
          <p class="hint">Si l'écran reste bloqué, essayez un rafraîchissement complet ou videz les données du site (cache). Ensuite, relancez depuis le navigateur.</p>
          <noscript>
            <p class="hint">JavaScript est désactivé : l'application ne peut pas démarrer.</p>
          </noscript>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
