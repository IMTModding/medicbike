<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEDICBIKE – Diagnostic</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body { height: 100%; margin: 0; }
      body { background: #0b1a2b; color: #ffffff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 720px; width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 18px; }
      h1 { margin: 0 0 8px; font-size: 18px; }
      p { margin: 0 0 10px; opacity: .9; }
      code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      a { color: #ffd54a; }
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; text-decoration: none; }
      .muted { opacity: .75; font-size: 12px; line-height: 1.5; }
      .ok { color: #6ee7b7; }
      .bad { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>MEDICBIKE – Page diagnostic (statique)</h1>
        <p class="muted">Si cette page s’affiche mais pas l’application, le problème vient du chargement JavaScript / cache (service worker).</p>

        <div id="info" class="muted">Chargement…</div>

        <div class="row">
          <a class="btn" href="/auth">Aller à /auth</a>
          <a class="btn" href="/">Aller à /</a>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var lines = [];
        lines.push('URL: ' + location.href);
        lines.push('User agent: ' + navigator.userAgent);
        lines.push('SW support: ' + ('serviceWorker' in navigator));

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistration().then(function (reg) {
            lines.push('SW registered: ' + (!!reg));
            if (reg) {
              lines.push('SW scope: ' + reg.scope);
              lines.push('SW active: ' + (reg.active && reg.active.scriptURL));
              lines.push('SW waiting: ' + (reg.waiting && reg.waiting.scriptURL));
              lines.push('SW installing: ' + (reg.installing && reg.installing.scriptURL));
            }
            document.getElementById('info').textContent = lines.join('\n');
          }).catch(function (e) {
            lines.push('SW getRegistration error: ' + (e && (e.message || e)));
            document.getElementById('info').textContent = lines.join('\n');
          });
        } else {
          document.getElementById('info').textContent = lines.join('\n');
        }
      })();
    </script>
  </body>
</html>
